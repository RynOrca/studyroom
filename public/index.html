<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云端自习室 - 大厅</title>
    <style>
        :root { 
            --primary-color: #667eea; 
            --primary-light: #8b9fee;
            --bg-color: #f7f8fa;
            --text-main: #2d3748; 
            --text-sec: #718096;
            --border-light: #edf2f7;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { background: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* 登录界面的毛玻璃依然保留 */
        .auth-card { background: rgba(255,255,255,0.9); padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .auth-card input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .auth-card button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary-color); color: white; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        
        /* 双栏主界面布局 */
        .dashboard-layout { display: none; width: 100%; max-width: 1000px; height: 85vh; background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); overflow: hidden; }
        
        /* 左侧边栏 */
        .sidebar { width: 280px; background: #fafafa; border-right: 1px solid var(--border-light); display: flex; flex-direction: column; padding: 20px; }
        .welcome-box { font-size: 20px; font-weight: bold; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .welcome-box span { font-size: 24px; }
        
        .nav-section-title { font-size: 13px; color: var(--text-sec); font-weight: 600; margin-bottom: 10px; padding-left: 10px; }
        .room-btn { display: flex; align-items: center; padding: 12px 15px; margin-bottom: 8px; border-radius: 10px; cursor: pointer; transition: 0.2s; color: var(--text-main); font-weight: 500; }
        .room-btn:hover { background: #e2e8f0; }
        .room-btn .icon { margin-right: 10px; font-size: 18px; }
        
        .sidebar-bottom { margin-top: auto; border-top: 1px solid var(--border-light); padding-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        .action-btn { background: transparent; border: none; text-align: left; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 500; color: var(--text-sec); transition: 0.2s; }
        .action-btn:hover { background: #e2e8f0; color: var(--text-main); }
        .action-btn.danger:hover { background: #fee2e2; color: #ef4444; }

        /* 让“我的 Memos”按钮更明显 */
        .action-btn.memos {
            background: transparent; border: none; text-align: left; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 500; color: var(--text-sec); transition: 0.2s;
        }
        .action-btn.memos:hover {
            background: #e2e8f0;
            color: var(--text-main);
        }
        

        /* 右侧时间轴 */
        .main-content { flex: 1; padding: 30px 40px; overflow-y: auto; background: white; }
        .main-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .main-header h2 { font-size: 22px; font-weight: 600; }
        
        .timeline-group { margin-bottom: 30px; }
        .timeline-date { font-size: 16px; font-weight: bold; color: var(--text-sec); margin-bottom: 15px; padding-bottom: 5px; border-bottom: 1px solid var(--border-light); }
        .timeline-item { display: flex; margin-bottom: 20px; position: relative; }
        .time-col { width: 120px; display: flex; flex-direction: column; color: var(--text-sec); font-size: 14px; position: relative; padding-right: 20px; }
        .time-col::after { content: ''; position: absolute; right: 0; top: 5px; bottom: -25px; width: 1px; background: #e2e8f0; }
        .timeline-item:last-child .time-col::after { display: none; }
        .dot { position: absolute; right: -4px; top: 6px; width: 9px; height: 9px; background: var(--primary-light); border-radius: 50%; box-shadow: 0 0 0 4px white; z-index: 2; }
        
        .task-col { flex: 1; padding-left: 20px; }
        .task-name { font-size: 16px; font-weight: 500; margin-bottom: 4px; color: var(--text-main); }
        .task-duration { font-size: 13px; color: var(--text-sec); }
        
        .empty-state { text-align: center; color: var(--text-sec); margin-top: 50px; font-size: 15px; }

        /* 页脚备案链接 — 深灰色，底部居中，不明显 */
        .icp-footer {
            position: fixed;
            bottom: 8px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            color: #a7a4a4;        /* 深灰色 */
            z-index: 1000;
            pointer-events: auto;   /* 确保链接可点击 */
        }
        .icp-footer a {
            color: #a7a4a4;
            text-decoration: none;
            transition: color 0.2s;
        }
        .icp-footer a:hover {
            color: #a7a4a4;         /* 稍微加深但保持低调 */
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-card" id="authSection">
        <h2 id="formTitle" style="margin-bottom:20px;">登录自习室</h2>
        <div id="authMessage" style="color: #ef4444; font-size: 14px; margin-bottom: 10px;"></div>
        <form onsubmit="handleAuth(event)">
            <input type="text" id="nickname" placeholder="专属昵称 (注册时必填)" style="display:none;">
            <input type="text" id="username" placeholder="账号" required>
            <input type="password" id="password" placeholder="密码" required>
            <button type="submit" id="submitBtn">登 录</button>
        </form>
        <div style="color:var(--primary-color); cursor:pointer; font-size:14px; margin-top:10px;" onclick="toggleMode()" id="toggleText">没有账号？点击注册</div>
    </div>

    <div class="dashboard-layout" id="dashboardSection">
        <div class="sidebar">
            <div class="welcome-box">
                <span>👋</span>
                <div>
                    <div style="font-size: 14px; font-weight: normal; color: var(--text-sec);">早上好，</div>
                    <div id="displayNickname">同学</div>
                </div>
            </div>
            
            <div class="nav-section-title">自习室房间</div>
            <div class="room-btn" onclick="enterRoom('roomA')"><span class="icon">😤</span> 奔赴山海</div>
            <div class="room-btn" onclick="enterRoom('roomB')"><span class="icon">😌</span> 藏锋守拙</div>
            <div class="room-btn" onclick="enterRoom('roomC')"><span class="icon">🤤</span> 心定如磐</div>
            
            <div class="sidebar-bottom">
                <button class="action-btn memos" onclick="openMemos()">我的 Memos</button>
                <button class="action-btn" onclick="window.location.href='/profile.html'">个人资料</button>
                <button class="action-btn danger" onclick="logout()">退出登录</button>
            </div>
        </div>
        
        <div class="main-content">
            <div class="main-header">
                <h2>专注记录</h2>
                <div style="font-size: 24px; cursor: pointer;" onclick="loadRecentRecords()" title="刷新记录">🫡</div>
            </div>
            <div id="timelineContent">加载中...</div>
        </div>
    </div>

    <!-- 底部 ICP 备案号：深灰色、居中、链接至工信部备案系统 -->
    <div class="icp-footer">
        <a href="https://beian.miit.gov.cn" target="_blank" rel="noopener noreferrer">粤ICP备2026022090号</a>
    </div>

    <script>
        let isLoginMode = true;

    
        window.onload = async () => {
            const token = localStorage.getItem('study_token');
            if (token) {
                try {
                    const res = await fetch('/api/verify', { headers: { 'Authorization': `Bearer ${token}` } });
                    const data = await res.json();
                    if (res.ok && data.user) showDashboard(data.user);
                    else localStorage.removeItem('study_token');
                } catch (e) { }
            }
        };
    

 

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('formTitle').innerText = isLoginMode ? '登录自习室' : '注册新账号';
            document.getElementById('submitBtn').innerText = isLoginMode ? '登 录' : '注 册';
            document.getElementById('toggleText').innerText = isLoginMode ? '没有账号？点击注册' : '已有账号？点击登录';
            document.getElementById('nickname').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('nickname').required = !isLoginMode;
        }

        async function handleAuth(e) {
            e.preventDefault();
            const payload = { username: document.getElementById('username').value, password: document.getElementById('password').value };
            if(!isLoginMode) payload.nickname = document.getElementById('nickname').value;

            try {
                const res = await fetch(isLoginMode ? '/api/login' : '/api/register', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (!res.ok) {
                    document.getElementById('authMessage').innerText = data.error;
                } else {
                    if (isLoginMode) {
                        localStorage.setItem('study_token', data.token);
                        localStorage.setItem('study_nickname', data.user.nickname);
                        // 检查是否有 redirect 参数
                        const urlParams = new URLSearchParams(window.location.search);
                        const redirect = urlParams.get('redirect');
                        if (redirect) {
                            window.location.href = redirect;
                        } else {
                            showDashboard(data.user);
                        }
                    } else {
                        document.getElementById('authMessage').innerText = '注册成功！请登录。';
                        document.getElementById('authMessage').style.color = '#1dd1a1';
                        setTimeout(() => toggleMode(), 1000);
                    }
                }
            } catch (err) { document.getElementById('authMessage').innerText = '网络错误'; }
        }

        function showDashboard(user) {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'flex';
            document.getElementById('displayNickname').innerText = user.nickname;
            loadRecentRecords();
        }

        async function loadRecentRecords() {
            const container = document.getElementById('timelineContent');
            const token = localStorage.getItem('study_token');
            try {
                const res = await fetch('/api/records/recent', { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                
                if(data.length === 0) {
                    container.innerHTML = '<div class="empty-state">暂无专注记录，快去自习室开始第一个番茄钟吧！</div>';
                    return;
                }

                // 按日期分组
                const groups = {};
                data.forEach(item => {
                    if(!groups[item.record_date]) groups[item.record_date] = [];
                    groups[item.record_date].push(item);
                });

                let html = '';
                for (let date in groups) {
                    // 格式化日期为 "3月1日"
                    const [y, m, d] = date.split('-');
                    html += `<div class="timeline-group"><div class="timeline-date">${parseInt(m)}月${parseInt(d)}日</div>`;
                    
                    groups[date].forEach(record => {
                        html += `
                        <div class="timeline-item">
                            <div class="time-col">
                                <div class="dot"></div>
                                <span>${record.time_str.substring(0,5)}</span>
                            </div>
                            <div class="task-col">
                                <div class="task-name">${record.task_name || '专注时刻'}</div>
                                <div class="task-duration">${record.duration_mins} 分钟</div>
                            </div>
                        </div>`;
                    });
                    html += `</div>`;
                }
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = '<div class="empty-state">加载记录失败</div>';
            }
        }

        function logout() {
            localStorage.removeItem('study_token');
            localStorage.removeItem('study_nickname');
            window.location.reload();
        }

        function enterRoom(roomId) { window.location.href = `/room.html?room=${roomId}`; }
        const MEMOS_URL = 'https://memos.letusstudytogether.online';
        function openMemos() {
            window.open(MEMOS_URL, '_blank', 'noopener,noreferrer');
        }
    </script>
</body>
</html>
